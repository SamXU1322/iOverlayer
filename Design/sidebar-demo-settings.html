<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iOverlayer - 设置</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117; display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .main-container {
    width: 1080px; height: 720px; display: flex;
    background-color: #1a1a2e; color: #c9d1d9; font-size: 11px;
    border-radius: 8px; overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
  }

  .sidebar {
    width: 150px; min-width: 150px; background-color: #16213e;
    border-right: 1px solid #0f3460; display: flex; flex-direction: column; user-select: none;
  }
  .logo-container {
    display: flex; align-items: center; padding: 10px 10px 8px 10px;
    border-bottom: 1px solid #0f3460;
  }
  .logo-icon {
    width: 24px; height: 24px; background-color: #1f6feb; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 12px; font-weight: bold; flex-shrink: 0;
  }
  .logo-text { color: #c9d1d9; font-size: 13px; font-weight: bold; margin-left: 6px; white-space: nowrap; }
  .nav-menu { padding: 6px 0; }
  .nav-item {
    display: block; width: calc(100% - 12px); background: transparent;
    border: none; border-radius: 4px; color: #8b949e; font-size: 11px;
    padding: 5px 10px; margin: 2px 6px; text-align: left; cursor: pointer;
    transition: background 0.15s, color 0.15s; text-decoration: none;
  }
  .nav-item:hover { background-color: #1f2937; }
  .nav-item.active { background-color: #1f6feb; color: #fff; }
  .spacer { flex-grow: 1; }
  .bottom-menu { border-top: 1px solid #0f3460; padding: 4px 0; }
  .version-text { padding: 6px 10px; color: #484f58; font-size: 9px; }

  .content-area {
    flex-grow: 1; display: flex; flex-direction: column;
    padding: 10px; overflow: hidden;
  }
  .header-row {
    display: flex; align-items: center; margin-bottom: 6px;
    gap: 8px; flex-shrink: 0;
  }
  .page-title { color: #c9d1d9; font-size: 13px; font-weight: bold; }
  .item-count { color: #8b949e; font-size: 10px; }
  .header-spacer { flex-grow: 1; }
  .close-btn {
    background: transparent; color: #8b949e; border: none;
    border-radius: 4px; padding: 4px 8px; font-size: 13px; cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .close-btn:hover { background-color: #f85149; color: #fff; }

  .page-body { flex-grow: 1; overflow-y: auto; }
  .page-body::-webkit-scrollbar { width: 4px; }
  .page-body::-webkit-scrollbar-track { background: transparent; }
  .page-body::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

  .settings-group { margin-bottom: 12px; }
  .settings-group-label {
    color: #8b949e; font-size: 10px; text-transform: uppercase;
    margin-bottom: 6px; padding-bottom: 4px;
    border-bottom: 1px solid #21262d;
  }
  .settings-row {
    display: flex; align-items: center; justify-content: space-between;
    background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
    padding: 8px 10px; margin-bottom: 4px;
  }
  .settings-label { color: #c9d1d9; font-size: 12px; }
  .settings-desc { color: #8b949e; font-size: 9px; margin-top: 1px; }

  .toggle-sw {
    width: 28px; height: 16px; background: #30363d;
    border-radius: 8px; position: relative; cursor: pointer;
    transition: background 0.2s; flex-shrink: 0;
  }
  .toggle-sw.on { background: #1f6feb; }
  .toggle-sw::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 12px; height: 12px; background: #fff; border-radius: 50%;
    transition: left 0.2s;
  }
  .toggle-sw.on::after { left: 14px; }

  input[type="range"] { accent-color: #1f6feb; width: 80px; }

  .browse-btn {
    background: transparent; border: 1px solid #30363d; border-radius: 4px;
    color: #8b949e; font-size: 10px; padding: 2px 8px; cursor: pointer;
    transition: all 0.15s;
  }
  .browse-btn:hover { border-color: #58a6ff; color: #58a6ff; }

  .extension-area {
    min-height: 80px; border: 1px dashed #484f58; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    margin-top: 6px; color: #484f58; font-size: 11px;
  }
</style>
</head>
<body>
<div class="main-container">
  <div class="sidebar">
    <div class="logo-container">
      <div class="logo-icon">i</div>
      <span class="logo-text">iOverlayer</span>
    </div>
    <nav class="nav-menu">
      <a class="nav-item" href="sidebar-demo-general.html">通用</a>
      <a class="nav-item" href="sidebar-demo-theme.html">主题样式</a>
      <a class="nav-item" href="sidebar-demo-shortcuts.html">快捷键</a>
    </nav>
    <div class="spacer"></div>
    <div class="bottom-menu">
      <a class="nav-item active" href="sidebar-demo-settings.html">设置</a>
      <a class="nav-item" href="sidebar-demo-about.html">关于</a>
      <div class="version-text">v0.1.0</div>
    </div>
  </div>

  <div class="content-area">
    <div class="header-row">
      <span class="page-title">设置</span>
      <span class="item-count">7 个选项</span>
      <span class="header-spacer"></span>
      <button class="close-btn">✕</button>
    </div>
    <div class="page-body">
      <div class="settings-group">
        <div class="settings-group-label">通用</div>
        <div class="settings-row">
          <div>
            <div class="settings-label">开机自启动</div>
            <div class="settings-desc">系统启动时自动运行 iOverlayer</div>
          </div>
          <span class="toggle-sw" onclick="this.classList.toggle('on')"></span>
        </div>
        <div class="settings-row">
          <div>
            <div class="settings-label">最小化到托盘</div>
            <div class="settings-desc">关闭窗口时最小化到系统托盘</div>
          </div>
          <span class="toggle-sw on" onclick="this.classList.toggle('on')"></span>
        </div>
        <div class="settings-row">
          <div>
            <div class="settings-label">自动检查更新</div>
            <div class="settings-desc">启动时检查新版本</div>
          </div>
          <span class="toggle-sw on" onclick="this.classList.toggle('on')"></span>
        </div>
      </div>

      <div class="settings-group">
        <div class="settings-group-label">覆盖层</div>
        <div class="settings-row">
          <div>
            <div class="settings-label">默认透明度</div>
            <div class="settings-desc">覆盖层的默认不透明度</div>
          </div>
          <input type="range" min="10" max="100" value="80">
        </div>
        <div class="settings-row">
          <div>
            <div class="settings-label">置顶窗口</div>
            <div class="settings-desc">覆盖层始终显示在最前</div>
          </div>
          <span class="toggle-sw on" onclick="this.classList.toggle('on')"></span>
        </div>
        <div class="settings-row">
          <div>
            <div class="settings-label">鼠标穿透</div>
            <div class="settings-desc">覆盖层不拦截鼠标事件</div>
          </div>
          <span class="toggle-sw" onclick="this.classList.toggle('on')"></span>
        </div>
      </div>

      <div class="settings-group">
        <div class="settings-group-label">数据</div>
        <div class="settings-row">
          <div>
            <div class="settings-label">配置文件路径</div>
            <div class="settings-desc">C:\Users\ASUS\.iOverlayer\</div>
          </div>
          <button class="browse-btn">浏览</button>
        </div>
      </div>

      <div class="extension-area">需要重启生效的设置将在此提示</div>
    </div>
  </div>
</div>
</body>
</html>
