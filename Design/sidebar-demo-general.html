<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iOverlayer - 通用</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .main-container {
    width: 1080px; height: 720px;
    display: flex;
    background-color: #1a1a2e;
    color: #c9d1d9;
    font-size: 11px;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
  }

  /* Sidebar */
  .sidebar {
    width: 150px; min-width: 150px;
    background-color: #16213e;
    border-right: 1px solid #0f3460;
    display: flex; flex-direction: column;
    user-select: none;
  }
  .logo-container {
    display: flex; align-items: center;
    padding: 10px 10px 8px 10px;
    border-bottom: 1px solid #0f3460;
  }
  .logo-icon {
    width: 24px; height: 24px;
    background-color: #1f6feb;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 12px; font-weight: bold; flex-shrink: 0;
  }
  .logo-text {
    color: #c9d1d9; font-size: 13px; font-weight: bold;
    margin-left: 6px; white-space: nowrap;
  }
  .nav-menu { padding: 6px 0; }
  .nav-item {
    display: block;
    width: calc(100% - 12px);
    background: transparent; border: none; border-radius: 4px;
    color: #8b949e; font-size: 11px;
    padding: 5px 10px; margin: 2px 6px;
    text-align: left; cursor: pointer;
    transition: background 0.15s, color 0.15s;
    text-decoration: none;
  }
  .nav-item:hover { background-color: #1f2937; }
  .nav-item.active { background-color: #1f6feb; color: #fff; }
  .spacer { flex-grow: 1; }
  .bottom-menu { border-top: 1px solid #0f3460; padding: 4px 0; }
  .version-text { padding: 6px 10px; color: #484f58; font-size: 9px; }

  /* Content */
  .content-area {
    flex-grow: 1;
    display: flex; flex-direction: column;
    padding: 10px; overflow: hidden;
  }
  .header-row {
    display: flex; align-items: center;
    margin-bottom: 6px; gap: 8px; flex-shrink: 0;
  }
  .page-title { color: #c9d1d9; font-size: 13px; font-weight: bold; }
  .item-count { color: #8b949e; font-size: 10px; }
  .header-spacer { flex-grow: 1; }
  .close-btn {
    background: transparent; color: #8b949e; border: none;
    border-radius: 4px; padding: 4px 8px; font-size: 13px; cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .close-btn:hover { background-color: #f85149; color: #fff; }

  .page-body { flex-grow: 1; overflow-y: auto; }
  .page-body::-webkit-scrollbar { width: 4px; }
  .page-body::-webkit-scrollbar-track { background: transparent; }
  .page-body::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

  .json-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .json-dropdown {
    flex-grow: 1; max-width: 180px;
    background-color: #0d1117; border: 1px solid #58a6ff; border-radius: 4px;
    color: #c9d1d9; font-size: 10px; padding: 2px 4px; outline: none;
  }
  .open-editor-btn {
    background-color: #238636; color: #fff; border: none;
    border-radius: 4px; padding: 4px 10px; font-size: 11px; cursor: pointer;
    transition: background 0.15s;
  }
  .open-editor-btn:hover { background-color: #2ea043; }

  .list-item {
    background-color: #0d1117; border: 1px solid #30363d; border-radius: 6px;
    padding: 8px 10px; display: flex; align-items: center; margin-bottom: 6px;
  }
  .item-index { color: #8b949e; font-size: 12px; min-width: 18px; }
  .item-index.active-index { color: #58a6ff; }
  .item-info {
    flex-grow: 1; display: flex; flex-direction: column;
    overflow: hidden; margin-left: 6px;
  }
  .item-title { color: #c9d1d9; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .item-title.inactive-title { color: #8b949e; }
  .item-subtitle { color: #8b949e; font-size: 9px; margin-top: 2px; }
  .item-actions { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }

  .toggle-sw {
    width: 28px; height: 16px; background: #30363d;
    border-radius: 8px; position: relative; cursor: pointer;
    transition: background 0.2s; margin-right: 4px;
  }
  .toggle-sw.on { background: #1f6feb; }
  .toggle-sw::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 12px; height: 12px; background: #fff; border-radius: 50%;
    transition: left 0.2s;
  }
  .toggle-sw.on::after { left: 14px; }

  .icon-btn {
    background: transparent; border: none;
    color: #8b949e; font-size: 12px; padding: 2px 4px; cursor: pointer;
    transition: color 0.15s;
  }
  .icon-btn:hover { color: #c9d1d9; }
  .icon-btn.delete-btn { color: #f85149; }
  .icon-btn.delete-btn:hover { color: #ff7b72; }

  .extension-area {
    min-height: 80px; border: 1px dashed #484f58; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    margin-top: 6px; color: #484f58; font-size: 11px; flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="main-container">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo-container">
      <div class="logo-icon">i</div>
      <span class="logo-text">iOverlayer</span>
    </div>
    <nav class="nav-menu">
      <a class="nav-item active" href="sidebar-demo-general.html">通用</a>
      <a class="nav-item" href="sidebar-demo-theme.html">主题样式</a>
      <a class="nav-item" href="sidebar-demo-shortcuts.html">快捷键</a>
    </nav>
    <div class="spacer"></div>
    <div class="bottom-menu">
      <a class="nav-item" href="sidebar-demo-settings.html">设置</a>
      <a class="nav-item" href="sidebar-demo-about.html">关于</a>
      <div class="version-text">v0.1.0</div>
    </div>
  </div>

  <!-- Content -->
  <div class="content-area">
    <div class="header-row">
      <span class="page-title">通用设置</span>
      <span class="item-count">3 项</span>
      <span class="header-spacer"></span>
      <button class="close-btn">✕</button>
    </div>
    <div class="page-body">
      <div class="json-bar">
        <select class="json-dropdown">
          <option>config.json</option>
          <option>settings.json</option>
        </select>
        <button class="open-editor-btn">打开编辑器</button>
      </div>

      <div class="list-item">
        <span class="item-index active-index">1</span>
        <div class="item-info">
          <span class="item-title">启用覆盖层</span>
          <span class="item-subtitle">控制叠加层显示/隐藏</span>
        </div>
        <div class="item-actions">
          <span class="toggle-sw on" onclick="this.classList.toggle('on')"></span>
          <button class="icon-btn">⚙</button>
          <button class="icon-btn delete-btn">✕</button>
        </div>
      </div>

      <div class="list-item">
        <span class="item-index">2</span>
        <div class="item-info">
          <span class="item-title inactive-title">全局快捷键</span>
          <span class="item-subtitle">配置全局热键</span>
        </div>
        <div class="item-actions">
          <span class="toggle-sw on" onclick="this.classList.toggle('on')"></span>
          <button class="icon-btn">⚙</button>
          <button class="icon-btn delete-btn">✕</button>
        </div>
      </div>

      <div class="list-item">
        <span class="item-index">3</span>
        <div class="item-info">
          <span class="item-title inactive-title">日志级别</span>
          <span class="item-subtitle">设置调试输出详细程度</span>
        </div>
        <div class="item-actions">
          <button class="icon-btn">⚙</button>
          <button class="icon-btn delete-btn">✕</button>
        </div>
      </div>

      <div class="extension-area">扩展区域</div>
    </div>
  </div>
</div>
</body>
</html>
