<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iOverlayer - 主题样式</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117; display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .main-container {
    width: 1080px; height: 720px; display: flex;
    background-color: #1a1a2e; color: #c9d1d9; font-size: 11px;
    border-radius: 8px; overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
  }

  .sidebar {
    width: 150px; min-width: 150px; background-color: #16213e;
    border-right: 1px solid #0f3460; display: flex; flex-direction: column; user-select: none;
  }
  .logo-container {
    display: flex; align-items: center; padding: 10px 10px 8px 10px;
    border-bottom: 1px solid #0f3460;
  }
  .logo-icon {
    width: 24px; height: 24px; background-color: #1f6feb; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 12px; font-weight: bold; flex-shrink: 0;
  }
  .logo-text { color: #c9d1d9; font-size: 13px; font-weight: bold; margin-left: 6px; white-space: nowrap; }
  .nav-menu { padding: 6px 0; }
  .nav-item {
    display: block; width: calc(100% - 12px); background: transparent;
    border: none; border-radius: 4px; color: #8b949e; font-size: 11px;
    padding: 5px 10px; margin: 2px 6px; text-align: left; cursor: pointer;
    transition: background 0.15s, color 0.15s; text-decoration: none;
  }
  .nav-item:hover { background-color: #1f2937; }
  .nav-item.active { background-color: #1f6feb; color: #fff; }
  .spacer { flex-grow: 1; }
  .bottom-menu { border-top: 1px solid #0f3460; padding: 4px 0; }
  .version-text { padding: 6px 10px; color: #484f58; font-size: 9px; }

  .content-area {
    flex-grow: 1; display: flex; flex-direction: column;
    padding: 10px; overflow: hidden;
  }
  .header-row {
    display: flex; align-items: center; margin-bottom: 6px;
    gap: 8px; flex-shrink: 0;
  }
  .page-title { color: #c9d1d9; font-size: 13px; font-weight: bold; }
  .item-count { color: #8b949e; font-size: 10px; }
  .header-spacer { flex-grow: 1; }
  .close-btn {
    background: transparent; color: #8b949e; border: none;
    border-radius: 4px; padding: 4px 8px; font-size: 13px; cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .close-btn:hover { background-color: #f85149; color: #fff; }

  .page-body { flex-grow: 1; overflow-y: auto; }

  .json-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }

  .theme-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  }
  .theme-card {
    background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
    padding: 10px; cursor: pointer; transition: border-color 0.15s;
  }
  .theme-card:hover { border-color: #58a6ff; }
  .theme-card.selected { border-color: #1f6feb; }
  .theme-preview {
    height: 40px; border-radius: 4px; margin-bottom: 6px;
    display: flex; overflow: hidden;
  }
  .theme-preview .tp-sidebar { width: 30%; }
  .theme-preview .tp-main { flex-grow: 1; }
  .theme-name { color: #c9d1d9; font-size: 11px; }

  .extension-area {
    min-height: 80px; border: 1px dashed #484f58; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    margin-top: 12px; color: #484f58; font-size: 11px;
  }
</style>
</head>
<body>
<div class="main-container">
  <div class="sidebar">
    <div class="logo-container">
      <div class="logo-icon">i</div>
      <span class="logo-text">iOverlayer</span>
    </div>
    <nav class="nav-menu">
      <a class="nav-item" href="sidebar-demo-general.html">通用</a>
      <a class="nav-item active" href="sidebar-demo-theme.html">主题样式</a>
      <a class="nav-item" href="sidebar-demo-shortcuts.html">快捷键</a>
    </nav>
    <div class="spacer"></div>
    <div class="bottom-menu">
      <a class="nav-item" href="sidebar-demo-settings.html">设置</a>
      <a class="nav-item" href="sidebar-demo-about.html">关于</a>
      <div class="version-text">v0.1.0</div>
    </div>
  </div>

  <div class="content-area">
    <div class="header-row">
      <span class="page-title">主题样式</span>
      <span class="item-count">6 套主题</span>
      <span class="header-spacer"></span>
      <button class="close-btn">✕</button>
    </div>
    <div class="page-body">
      <div class="json-bar">
        <span style="color:#8b949e;font-size:10px;">选择界面主题配色方案</span>
      </div>
      <div class="theme-grid">
        <div class="theme-card selected">
          <div class="theme-preview">
            <div class="tp-sidebar" style="background:#16213e;"></div>
            <div class="tp-main" style="background:#1a1a2e;"></div>
          </div>
          <div class="theme-name">深海暗色</div>
        </div>
        <div class="theme-card">
          <div class="theme-preview">
            <div class="tp-sidebar" style="background:#1e1e1e;"></div>
            <div class="tp-main" style="background:#252526;"></div>
          </div>
          <div class="theme-name">经典暗色</div>
        </div>
        <div class="theme-card">
          <div class="theme-preview">
            <div class="tp-sidebar" style="background:#0c0c1d;"></div>
            <div class="tp-main" style="background:#16163a;"></div>
          </div>
          <div class="theme-name">午夜蓝</div>
        </div>
        <div class="theme-card">
          <div class="theme-preview">
            <div class="tp-sidebar" style="background:#1a1a1a;"></div>
            <div class="tp-main" style="background:#2d2d2d;"></div>
          </div>
          <div class="theme-name">石墨灰</div>
        </div>
        <div class="theme-card">
          <div class="theme-preview">
            <div class="tp-sidebar" style="background:#0d1117;"></div>
            <div class="tp-main" style="background:#161b22;"></div>
          </div>
          <div class="theme-name">GitHub 暗色</div>
        </div>
        <div class="theme-card">
          <div class="theme-preview">
            <div class="tp-sidebar" style="background:#1e1e2e;"></div>
            <div class="tp-main" style="background:#1a1826;"></div>
          </div>
          <div class="theme-name">Catppuccin</div>
        </div>
      </div>
      <div class="extension-area">实时预览区域</div>
    </div>
  </div>
</div>
</body>
</html>
